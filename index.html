<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流畅单车骑行</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system;
    background: linear-gradient(#cfe8ff, #ffffff);
}

.scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* 路 */
.road {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 140px;
    background: #2b2b2b;
}

/* 单车 */
.bike {
    position: absolute;
    bottom: 160px;
    left: 0;
    width: 80px;
    height: 80px;
}

/* 车轮 */
.wheel {
    width: 30px;
    height: 30px;
    border: 3px solid black;
    border-radius: 50%;
    position: absolute;
    bottom: 0;
}

/* UI */
.ui {
    position: absolute;
    top: 20px;
    left: 20px;
}

button {
    padding: 10px 14px;
    border: none;
    background: black;
    color: white;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="scene">

    <div class="ui">
        🚲 速度：<span id="speed">0</span><br><br>
        <button id="rideBtn">按住骑行</button>
        <button onclick="reset()">重置</button>
    </div>

    <div class="bike" id="bike">
        <div class="wheel" style="left:0;"></div>
        <div class="wheel" style="right:0;"></div>
    </div>

    <div class="road"></div>

</div>

<script>
let x = 0;
let speed = 0;
let riding = false;

const bike = document.getElementById("bike");
const speedText = document.getElementById("speed");

/* 按住开始 */
const btn = document.getElementById("rideBtn");

btn.addEventListener("touchstart", startRide);
btn.addEventListener("mousedown", startRide);

btn.addEventListener("touchend", stopRide);
btn.addEventListener("mouseup", stopRide);

function startRide() {
    riding = true;
    speed = 6;
}

/* 松开停止 */
function stopRide() {
    riding = false;
    speed = 0;
}

/* 重置 */
function reset() {
    x = 0;
    bike.style.left = "0px";
}

/* 动画帧（关键优化） */
function loop() {
    if (riding) {
        x += speed;
        bike.style.left = x + "px";
        speedText.innerText = speed;
    }

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
