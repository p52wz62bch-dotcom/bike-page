<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单车网页</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f5f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #1d1d1f;
}

.container {
    text-align: center;
}

h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

p {
    color: #6e6e73;
    font-size: 14px;
}

.bike {
    width: 220px;
    height: 140px;
    margin: 40px auto;
    position: relative;
}

/* 车轮 */
.wheel {
    width: 60px;
    height: 60px;
    border: 4px solid #333;
    border-radius: 50%;
    position: absolute;
    bottom: 0;
    animation: spin 2s linear infinite;
}

.wheel.left { left: 0; }
.wheel.right { right: 0; }

/* 车架 */
.frame {
    width: 110px;
    height: 4px;
    background: #333;
    position: absolute;
    top: 50px;
    left: 55px;
    transform: rotate(20deg);
}

/* 座椅 */
.seat {
    width: 30px;
    height: 4px;
    background: #333;
    position: absolute;
    top: 25px;
    left: 70px;
}

/* 车把 */
.handle {
    width: 30px;
    height: 4px;
    background: #333;
    position: absolute;
    top: 35px;
    right: 45px;
    transform: rotate(-30deg);
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: black;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #333;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1>🚲 我的单车</h1>
    <p>极简风网页正式版</p>

    <div class="bike">
        <div class="wheel left"></div>
        <div class="wheel right"></div>
        <div class="frame"></div>
        <div class="seat"></div>
        <div class="handle"></div>
    </div>
</div>

</body>
</html>
