<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单车终点完整版</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system;
    background: linear-gradient(#cfe8ff, #ffffff);
}

.scene {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* 路 */
.road {
    position: absolute;
    bottom: 0;
    width: 300%;
    height: 140px;
    background: #2b2b2b;
}

/* 单车 */
.bike {
    position: absolute;
    bottom: 160px;
    left: 0;
    width: 90px;
    height: 60px;
}

/* 车轮 */
.wheel {
    width: 28px;
    height: 28px;
    border: 3px solid black;
    border-radius: 50%;
    position: absolute;
    bottom: 0;
}

/* 车架（恢复了！！） */
.frame {
    position: absolute;
    width: 50px;
    height: 3px;
    background: black;
    top: 25px;
    left: 20px;
    transform: rotate(20deg);
}

/* 终点 */
.finish {
    position: absolute;
    right: 80px;
    bottom: 140px;
    width: 10px;
    height: 120px;
    background: red;
}

/* UI */
.ui {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
}

button {
    padding: 10px 14px;
    border: none;
    background: black;
    color: white;
    border-radius: 10px;
}

/* 胜利 */
.win {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    display: none;
    color: green;
}
</style>
</head>

<body>

<div class="scene">

    <div class="ui">
        🚲 距离：<span id="dist">0</span><br><br>
        <button id="rideBtn">按住骑行</button>
    </div>

    <div class="bike" id="bike">
        <div class="wheel" style="left:0;"></div>
        <div class="wheel" style="right:0;"></div>
        <div class="frame"></div>
    </div>

    <div class="road"></div>

    <div class="finish"></div>

    <div class="win" id="win">🏆 通关成功！</div>

</div>

<script>
let x = 0;
let riding = false;
let speed = 0;

const bike = document.getElementById("bike");
const dist = document.getElementById("dist");
const win = document.getElementById("win");

const btn = document.getElementById("rideBtn");

/* 兼容手机 + iPad + 鼠标 */
btn.addEventListener("touchstart", start);
btn.addEventListener("mousedown", start);

btn.addEventListener("touchend", stop);
btn.addEventListener("mouseup", stop);

function start() {
    riding = true;
    speed = 4;
}

function stop() {
    riding = false;
    speed = 0;
}

/* 游戏循环 */
function loop() {
    if (riding) {
        x += speed;
        bike.style.left = x + "px";
        dist.innerText = Math.floor(x);

        checkWin();
    }

    requestAnimationFrame(loop);
}

function checkWin() {
    if (x > 900) {
        win.style.display = "block";
        riding = false;
    }
}

loop();
</script>

</body>
</html>
