<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可见横版骑行游戏</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system;
    background: #87c7ff;
}

/* 世界 */
.world {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* 天空 */
.sky {
    position: absolute;
    width: 200%;
    height: 100%;
    background: linear-gradient(#87c7ff, #ffffff);
    animation: skyMove 6s linear infinite;
}

/* 地面 */
.ground {
    position: absolute;
    bottom: 0;
    width: 300%;
    height: 140px;
    background: #2b2b2b;
    animation: groundMove 2s linear infinite;
}

/* 路纹（让你“看见在动”） */
.ground::after {
    content: "";
    position: absolute;
    top: 60px;
    width: 200%;
    height: 8px;
    background: repeating-linear-gradient(
        90deg,
        white 0px,
        white 30px,
        transparent 30px,
        transparent 60px
    );
}

/* 单车 */
.bike {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 60px;
}

/* 车轮 */
.wheel {
    width: 28px;
    height: 28px;
    border: 3px solid black;
    border-radius: 50%;
    position: absolute;
    bottom: 0;
    animation: spin 0.4s linear infinite;
}

/* 金币（明显变大） */
.coin {
    position: absolute;
    width: 26px;
    height: 26px;
    background: gold;
    border-radius: 50%;
    border: 2px solid #b8860b;
}

/* 障碍（明显红色） */
.obstacle {
    position: absolute;
    width: 26px;
    height: 26px;
    background: red;
}

/* UI */
.ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

/* 动画 */
@keyframes groundMove {
    from { transform: translateX(0); }
    to { transform: translateX(-40%); }
}

@keyframes skyMove {
    from { transform: translateX(0); }
    to { transform: translateX(-10%); }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="world">

    <div class="sky"></div>
    <div class="ground" id="ground"></div>

    <div class="bike">
        <div class="wheel" style="left:0;"></div>
        <div class="wheel" style="right:0;"></div>
    </div>

    <div class="ui">
        🚲 分数：<span id="score">0</span><br><br>
        <button onclick="speedUp()">加速</button>
        <button onclick="speedDown()">减速</button>
    </div>

</div>

<script>

let speed = 2;
let score = 0;

/* 控制速度 */
function speedUp() {
    speed += 1;
    update();
}

function speedDown() {
    speed = Math.max(1, speed - 1);
    update();
}

function update() {
    document.getElementById("ground").style.animationDuration = (2 / speed) + "s";
}

/* 金币 */
function spawnCoin() {
    const coin = document.createElement("div");
    coin.className = "coin";
    coin.style.left = window.innerWidth + "px";
    coin.style.top = (200 + Math.random() * 200) + "px";
    document.body.appendChild(coin);

    let x = window.innerWidth;

    let move = setInterval(() => {
        x -= speed * 5;
        coin.style.left = x + "px";

        if (x < -50) {
            coin.remove();
            clearInterval(move);
        }

        if (x < window.innerWidth / 2 + 30 && x > window.innerWidth / 2 - 30) {
            score += 10;
            document.getElementById("score").innerText = score;
            coin.remove();
            clearInterval(move);
        }
    }, 30);
}

/* 障碍 */
function spawnObstacle() {
    const obs = document.createElement("div");
    obs.className = "obstacle";
    obs.style.left = window.innerWidth + "px";
    obs.style.bottom = "160px";
    document.body.appendChild(obs);

    let x = window.innerWidth;

    let move = setInterval(() => {
        x -= speed * 6;
        obs.style.left = x + "px";

        if (x < -50) {
            obs.remove();
            clearInterval(move);
        }

        if (x < window.innerWidth / 2 + 30 && x > window.innerWidth / 2 - 30) {
            score -= 10;
            document.getElementById("score").innerText = score;
            obs.remove();
            clearInterval(move);
        }
    }, 30);
}

setInterval(spawnCoin, 1500);
setInterval(spawnObstacle, 2500);

update();

</script>

</body>
</html>
