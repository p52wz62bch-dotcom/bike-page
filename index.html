<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单车终点赛</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: #cfe8ff;
}

/* 游戏区域 */
.game {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* 跑道 */
.road {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 120px;
    background: #333;
}

/* 路面线 */
.line {
    position: absolute;
    top: 55px;
    width: 100%;
    height: 10px;
    background: repeating-linear-gradient(
        90deg,
        white 0px,
        white 40px,
        transparent 40px,
        transparent 80px
    );
}

/* 单车 */
.bike {
    position: absolute;
    bottom: 130px;
    left: 100px;
    width: 60px;
    height: 60px;
}

/* 车轮 */
.wheel {
    width: 25px;
    height: 25px;
    border: 3px solid #000;
    border-radius: 50%;
    position: absolute;
    animation: spin linear infinite;
}

.wheel.left { left: 0; bottom: 0; }
.wheel.right { right: 0; bottom: 0; }

/* 终点线 */
.finish {
    position: absolute;
    right: 50px;
    bottom: 120px;
    width: 10px;
    height: 150px;
    background: red;
}

/* UI */
.ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

button {
    padding: 8px 12px;
    margin: 3px;
}

/* 胜利弹窗 */
.win {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    display: none;
    color: green;
}

/* 动画 */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="game">

    <div class="ui">
        🚲 距离：<span id="distance">0</span> m<br>
        <button onclick="move()">前进</button>
    </div>

    <div class="bike" id="bike">
        <div class="wheel left"></div>
        <div class="wheel right"></div>
    </div>

    <div class="road">
        <div class="line"></div>
    </div>

    <div class="finish"></div>

    <div class="win" id="win">🏆 通关成功！</div>

</div>

<script>
let distance = 0;
let speed = 5;
let bike = document.getElementById("bike");
let win = document.getElementById("win");

function move() {
    distance += speed;
    document.getElementById("distance").innerText = distance;

    bike.style.left = (100 + distance) + "px";

    checkWin();
}

function checkWin() {
    if (distance >= 500) {
        win.style.display = "block";
    }
}
</script>

</body>
</html>
