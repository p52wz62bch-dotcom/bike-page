<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按住骑行终点游戏</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system;
    background: linear-gradient(#87c7ff, #ffffff);
}

/* 世界 */
.world {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* 路 */
.road {
    position: absolute;
    bottom: 0;
    width: 3000px; /* 终点在这里 */
    height: 140px;
    background: #2b2b2b;
}

/* 路纹 */
.road::after {
    content: "";
    position: absolute;
    top: 60px;
    width: 3000px;
    height: 8px;
    background: repeating-linear-gradient(
        90deg,
        white 0px,
        white 40px,
        transparent 40px,
        transparent 80px
    );
}

/* 单车 */
.bike {
    position: absolute;
    bottom: 160px;
    left: 100px;
    width: 80px;
    height: 60px;
}

/* 车轮 */
.wheel {
    width: 28px;
    height: 28px;
    border: 3px solid black;
    border-radius: 50%;
    position: absolute;
    bottom: 0;
}

/* UI */
.ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

/* 金币 */
.coin {
    position: absolute;
    width: 22px;
    height: 22px;
    background: gold;
    border-radius: 50%;
}

/* 终点 */
.finish {
    position: absolute;
    right: 0;
    bottom: 140px;
    width: 10px;
    height: 160px;
    background: red;
}

/* 胜利 */
.win {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: green;
    display: none;
}
</style>
</head>

<body>

<div class="world">

    <div class="road"></div>

    <div class="bike" id="bike">
        <div class="wheel" style="left:0;"></div>
        <div class="wheel" style="right:0;"></div>
    </div>

    <div class="finish"></div>

    <div class="ui">
        🚲 距离：<span id="dist">0</span> / 2500<br><br>
        <button id="btn">按住骑行</button>
    </div>

    <div class="win" id="win">🏆 到达终点！获得奖励！</div>

</div>

<script>

let bike = document.getElementById("bike");
let btn = document.getElementById("btn");

let x = 100;
let riding = false;
let speed = 5;

let dist = 0;
let MAX = 2500;

/* 按住控制 */
btn.addEventListener("touchstart", start);
btn.addEventListener("mousedown", start);

btn.addEventListener("touchend", stop);
btn.addEventListener("mouseup", stop);

function start() {
    riding = true;
}

function stop() {
    riding = false;
}

/* 主循环 */
function loop() {

    if (riding && dist < MAX) {
        x += speed;
        dist += speed;

        bike.style.left = x + "px";
        document.getElementById("dist").innerText = Math.floor(dist);

        if (dist >= MAX) {
            document.getElementById("win").style.display = "block";
            riding = false;
        }
    }

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
