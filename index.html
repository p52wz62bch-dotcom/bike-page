<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祝妈妈生日快乐</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: linear-gradient(135deg, #ffd6e7, #fff3d6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 卡片 */
.card {
    width: 90%;
    max-width: 420px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
    text-align: center;
}

/* 图片 */
.card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

/* 文字 */
.title {
    font-size: 26px;
    font-weight: bold;
    color: #ff4d6d;
    margin-top: 20px;
}

.text {
    padding: 15px 20px 30px;
    font-size: 16px;
    color: #444;
    line-height: 1.6;
}

.heart {
    color: red;
    font-size: 20px;
}
</style>

</head>

<body>

<div class="card">

    <!-- 妈妈图片（温柔母亲形象） -->
    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=800&q=80" alt="妈妈">

    <div class="title">🎂 祝妈妈生日快乐 🎂</div>

    <div class="text">
        妈妈，生日快乐！<br><br>
        感谢你一直以来的照顾与陪伴 ❤️<br>
        愿你每天都开心、健康、温柔如初 🌷<br><br>
        <span class="heart">❤</span> 我爱你
    </div>

</div>

</body>
</html>
