<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>终点骑行游戏</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system;
    background: linear-gradient(#87c7ff, #ffffff);
}

/* 世界 */
.world {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* 天空 */
.sky {
    position: absolute;
    width: 200%;
    height: 100%;
    background: linear-gradient(#87c7ff, #ffffff);
    animation: skyMove 6s linear infinite;
}

/* 地面 */
.ground {
    position: absolute;
    bottom: 0;
    width: 300%;
    height: 140px;
    background: #2b2b2b;
}

/* 路纹 */
.ground::after {
    content: "";
    position: absolute;
    top: 60px;
    width: 300%;
    height: 8px;
    background: repeating-linear-gradient(
        90deg,
        white 0px,
        white 40px,
        transparent 40px,
        transparent 80px
    );
}

/* 单车（固定） */
.bike {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 60px;
}

/* 车轮 */
.wheel {
    width: 28px;
    height: 28px;
    border: 3px solid black;
    border-radius: 50%;
    position: absolute;
    bottom: 0;
    animation: spin 0.4s linear infinite;
}

/* UI */
.ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

/* 金币 */
.coin {
    position: absolute;
    width: 22px;
    height: 22px;
    background: gold;
    border-radius: 50%;
}

/* 障碍 */
.obstacle {
    position: absolute;
    width: 22px;
    height: 22px;
    background: red;
}

/* 终点旗 */
.finish {
    position: absolute;
    width: 10px;
    height: 160px;
    background: red;
    top: 200px;
}

/* 胜利 */
.win {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: green;
    display: none;
}

/* 动画 */
@keyframes skyMove {
    from { transform: translateX(0); }
    to { transform: translateX(-10%); }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="world">

    <div class="sky"></div>
    <div class="ground" id="ground"></div>

    <div class="bike">
        <div class="wheel" style="left:0;"></div>
        <div class="wheel" style="right:0;"></div>
    </div>

    <div class="ui">
        🚲 距离：<span id="dist">0</span> / 2000<br>
        <button onclick="speedUp()">加速</button>
        <button onclick="speedDown()">减速</button>
    </div>

    <div class="finish" id="finish"></div>

    <div class="win" id="win">🏆 通关成功！</div>

</div>

<script>

let speed = 3;
let dist = 0;
let MAX = 2000;
let gameOver = false;

/* 背景速度 */
function updateSpeed() {
    document.getElementById("ground").style.transform =
        `translateX(-${dist * 2}px)`;
}

/* 控制 */
function speedUp() {
    speed += 1;
}

function speedDown() {
    speed = Math.max(1, speed - 1);
}

/* 金币 */
function spawnCoin() {
    const coin = document.createElement("div");
    coin.className = "coin";
    coin.style.left = window.innerWidth + "px";
    coin.style.top = (200 + Math.random() * 200) + "px";
    document.body.appendChild(coin);

    let x = window.innerWidth;

    let move = setInterval(() => {
        if (gameOver) return;

        x -= speed * 5;
        coin.style.left = x + "px";

        if (x < -50) {
            coin.remove();
            clearInterval(move);
        }

    }, 30);
}

/* 障碍 */
function spawnObstacle() {
    const obs = document.createElement("div");
    obs.className = "obstacle";
    obs.style.left = window.innerWidth + "px";
    obs.style.bottom = "160px";
    document.body.appendChild(obs);

    let x = window.innerWidth;

    let move = setInterval(() => {
        if (gameOver) return;

        x -= speed * 6;
        obs.style.left = x + "px";

        if (x < -50) {
            obs.remove();
            clearInterval(move);
        }

    }, 30);
}

/* 游戏主循环 */
function loop() {
    if (!gameOver) {

        dist += speed;
        updateSpeed();

        document.getElementById("dist").innerText = Math.floor(dist);

        /* 到终点 */
        if (dist >= MAX) {
            gameOver = true;
            document.getElementById("win").style.display = "block";
        }
    }

    requestAnimationFrame(loop);
}

setInterval(spawnCoin, 1200);
setInterval(spawnObstacle, 2000);

loop();

</script>

</body>
</html>
