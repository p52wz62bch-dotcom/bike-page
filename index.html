<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跑酷终点版</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system;
    background: #87c7ff;
}

/* 世界 */
.world {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* 地面 */
.ground {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 140px;
    background: #2b2b2b;
}

/* 路线 */
.ground::after {
    content: "";
    position: absolute;
    top: 60px;
    width: 200%;
    height: 8px;
    background: repeating-linear-gradient(
        90deg,
        white 0px,
        white 40px,
        transparent 40px,
        transparent 80px
    );
}

/* 玩家 */
.player {
    position: absolute;
    bottom: 160px;
    width: 50px;
    height: 50px;
    background: black;
    border-radius: 10px;
    left: 50%;
    transform: translateX(-50%);
}

/* 三车道位置 */
.lane0 { left: 35%; }
.lane1 { left: 50%; }
.lane2 { left: 65%; }

/* 金币 */
.coin {
    position: absolute;
    width: 20px;
    height: 20px;
    background: gold;
    border-radius: 50%;
}

/* 障碍 */
.obstacle {
    position: absolute;
    width: 25px;
    height: 25px;
    background: red;
}

/* 终点 */
.finish {
    position: absolute;
    right: 0;
    bottom: 140px;
    width: 10px;
    height: 180px;
    background: green;
}

/* UI */
.ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

.win {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: green;
    display: none;
}
</style>
</head>

<body>

<div class="world">

    <div class="ground"></div>

    <div class="player lane1" id="player"></div>

    <div class="finish"></div>

    <div class="ui">
        🪙 分数：<span id="score">0</span><br>
        🏁 距离：<span id="dist">0</span> / 2000
    </div>

    <div class="win" id="win">🏆 通关成功！</div>

</div>

<script>

let player = document.getElementById("player");
let lane = 1;

let score = 0;
let dist = 0;
let MAX = 2000;

let speed = 4;
let gameOver = false;

/* 切换车道 */
function setLane(l) {
    lane = Math.max(0, Math.min(2, l));
    player.className = "player lane" + lane;
}

/* 触摸滑动控制 */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (endX - startX > 50) setLane(lane + 1);
    if (startX - endX > 50) setLane(lane - 1);
});

/* 金币 */
function spawnCoin() {
    const c = document.createElement("div");
    c.className = "coin";
    c.style.left = (35 + Math.floor(Math.random()*3)*15) + "%";
    c.style.top = "-20px";
    document.body.appendChild(c);

    let y = -20;

    let move = setInterval(() => {
        if (gameOver) return;

        y += speed * 3;
        c.style.top = y + "px";

        if (y > window.innerHeight) c.remove();

        if (y > window.innerHeight - 200) {
            score++;
            document.getElementById("score").innerText = score;
            c.remove();
        }

    }, 30);
}

/* 障碍 */
function spawnObstacle() {
    const o = document.createElement("div");
    o.className = "obstacle";
    o.style.left = (35 + Math.floor(Math.random()*3)*15) + "%";
    o.style.top = "-30px";
    document.body.appendChild(o);

    let y = -30;

    let move = setInterval(() => {
        if (gameOver) return;

        y += speed * 4;
        o.style.top = y + "px";

        if (y > window.innerHeight) o.remove();

        if (y > window.innerHeight - 200) {
            if (Math.floor(Math.random()*3) === lane) {
                gameOver = true;
                alert("撞到障碍！");
            }
            o.remove();
        }

    }, 30);
}

/* 主循环 */
function loop() {
    if (!gameOver) {

        dist += speed;
        document.getElementById("dist").innerText = Math.floor(dist);

        if (dist >= MAX) {
            gameOver = true;
            document.getElementById("win").style.display = "block";
        }
    }

    requestAnimationFrame(loop);
}

setInterval(spawnCoin, 1200);
setInterval(spawnObstacle, 1600);

loop();

</script>

</body>
</html>
