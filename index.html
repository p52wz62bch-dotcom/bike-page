<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单车骑行模拟</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont;
    background: linear-gradient(#cfe8ff, #ffffff);
}

/* 场景 */
.scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* 路（背景） */
.road {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 140px;
    background: #2b2b2b;
    transform: skewX(-10deg);
    left: -50%;
}

/* 路面线 */
.road::after {
    content: "";
    position: absolute;
    top: 60px;
    width: 200%;
    height: 6px;
    background: repeating-linear-gradient(
        90deg,
        white 0px,
        white 50px,
        transparent 50px,
        transparent 100px
    );
}

/* 单车（重点：浮在路上方） */
.bike {
    position: absolute;
    bottom: 160px;   /* ⭐关键：抬高避免“掉进路里” */
    left: 0;
    width: 80px;
    height: 80px;
    transition: left 0.2s linear;
}

/* 车轮 */
.wheel {
    width: 30px;
    height: 30px;
    border: 3px solid black;
    border-radius: 50%;
    position: absolute;
    bottom: 0;
}

/* UI */
.ui {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
}

button {
    padding: 8px 12px;
    border: none;
    background: black;
    color: white;
    border-radius: 8px;
    margin-right: 5px;
}

</style>
</head>

<body>

<div class="scene">

    <div class="ui">
        🚲 位置：<span id="pos">0</span>
        <br><br>
        <button onclick="ride()">骑行</button>
        <button onclick="reset()">重置</button>
    </div>

    <div class="bike" id="bike">
        <div class="wheel" style="left:0;"></div>
        <div class="wheel" style="right:0;"></div>
    </div>

    <div class="road"></div>

</div>

<script>
let x = 0;

function ride() {
    x += 30;
    document.getElementById("bike").style.left = x + "px";
    document.getElementById("pos").innerText = x;
}

function reset() {
    x = 0;
    document.getElementById("bike").style.left = "0px";
    document.getElementById("pos").innerText = 0;
}
</script>

</body>
</html>
